name: Actualizar Bitácora de Valor

on:
  workflow_dispatch: # Esto activa el botón manual "Run workflow"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout del código
      uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Ejecutar script de alertas
      env:
        HIGHLIGHTLY_API_KEY: ${{ secrets.HIGHLIGHTLY_API_KEY }}
      run: python main.py

    - name: Desplegar resultados a GitHub Pages
      uses: JamesIves/github-pages-deploy-action@v4
      with:
        folder: docs # Sube la carpeta docs generada a GitHub Pages
        branch: main
