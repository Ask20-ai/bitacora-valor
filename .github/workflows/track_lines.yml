name: Rastrear movimiento de línea (NFL/NBA)

on:
  schedule:
    # Dos veces al dia: 12:00 y 23:00 UTC
    - cron: "0 12,23 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  track:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Arreglar git (detached HEAD / ownership)
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git checkout -B "${{ github.ref_name }}"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install requests

      - name: Rastrear movimiento de línea
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: python -m line_tracker.track_lines

      - name: Commitear resultados
        run: |
          git config user.name "bitacora-bot"
          git config user.email "bot@users.noreply.github.com"
          git add line_tracker/data/
          git diff --quiet --cached || git commit -m "Actualización de movimiento de línea NFL/NBA"
          git push
